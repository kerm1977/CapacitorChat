<!-- Archivo: chat.html -->

<!-- ========================================================= -->
<!-- 1. MODAL: LISTA DE CONTACTOS (PANTALLA COMPLETA)          -->
<!-- ========================================================= -->
<div class="modal fade" id="modalChat" tabindex="-1" aria-hidden="true">
    <style>
        /* Alturas optimizadas para la navegación interna */
        #chat-contacts { flex-grow: 1; height: auto; overflow-y: auto; background-color: #fff; }
        #chat-window { flex-grow: 1; overflow-y: auto; background-color: #f0f2f5; padding: 15px; }
        .btn-adjunto-active { background-color: #d1e7dd !important; color: #0f5132 !important; border-color: #badbcc !important; }
        
        /* Ajuste para el dropdown de opciones dentro del modal */
        .dropdown-menu { z-index: 1060; }
        
        /* Asegurar que la sala de chat ocupe el espacio correcto cuando está activa */
        #chat-room.d-flex { flex-direction: column; height: 100%; }

        /* Área segura para la barra de estado (hora, batería) */
        .modal-header-safe {
            padding-top: max(env(safe-area-inset-top, 45px), 50px) !important;
        }
    </style>
    
    <div class="modal-dialog modal-fullscreen m-0">
        <div class="modal-content border-0 d-flex flex-column">
            
            <!-- Cabecera del Modal (WARNING / AMARILLO ORIGINAL) -->
            <div class="modal-header bg-warning text-dark border-0 py-3 modal-header-safe">
                <div class="d-flex align-items-center w-100">
                    <div class="bg-white rounded-circle p-2 me-3 shadow-sm d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;">
                        <i class="bi bi-chat-dots-fill fs-4 text-warning"></i>
                    </div>
                    <div>
                        <h5 class="modal-title fw-bold mb-0">Chat de la Tribu</h5>
                        <small class="text-dark opacity-75" id="chat-my-name">Conectando...</small>
                    </div>
                </div>
                <button type="button" class="btn-close btn-close-dark" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            
            <!-- Cuerpo del Modal -->
            <div class="modal-body p-0 d-flex flex-column flex-grow-1 position-relative">
                
                <!-- PESTAÑA 1: LISTA DE CONTACTOS -->
                <div id="chat-contacts-view" class="d-flex flex-column h-100">
                    <div class="p-3 bg-light border-bottom">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                            <input type="text" id="chat-search" class="form-control border-start-0 ps-0" placeholder="Buscar compañero...">
                        </div>
                    </div>
                    <div id="chat-contacts" class="p-2 flex-grow-1">
                        <div class="text-center text-muted mt-4">
                            <div class="spinner-border text-warning spinner-border-sm" role="status"></div>
                            <span class="ms-2">Cargando contactos...</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- ========================================================= -->
<!-- 2. HOJA NUEVA: SALA DE CHAT INDEPENDIENTE                 -->
<!-- ========================================================= -->
<style>
    /* Estilo interno de la sala de chat */
    .chat-hoja-nueva {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1070; /* CRÍTICO: Mayor a 1055 (Modal) para evitar bloqueos del backdrop */
        background-color: white;
    }
    
    .chat-hoja-nueva.activa { display: flex !important; flex-direction: column; }
    
    /* Protege el área segura superior de la hoja del chat también */
    .chat-header-safe {
        padding-top: max(env(safe-area-inset-top, 45px), 50px) !important;
    }
</style>

<div id="chat-room" class="chat-hoja-nueva d-none">
    
    <!-- Cabecera de la Sala de Chat (HOJA NUEVA) -->
    <div class="modal-header bg-warning text-dark border-0 py-3 shadow-sm px-3 d-flex align-items-center chat-header-safe">
        <!-- Botón para cerrar la hoja (regresar) -->
        <button class="btn btn-dark rounded-circle me-3 d-flex align-items-center justify-content-center shadow-sm" style="width: 40px; height: 40px;" onclick="window.ChatManager.volverAContactos()">
            <i class="bi bi-arrow-left fs-5"></i>
        </button>
        
        <div class="d-flex align-items-center flex-grow-1">
            <div class="position-relative me-3">
                <div class="bg-white rounded-circle d-flex align-items-center justify-content-center shadow-sm" style="width: 45px; height: 45px;">
                    <i class="bi bi-person-fill fs-3 text-secondary"></i>
                </div>
                <!-- Punto de estado dinámico -->
                <span id="chat-room-status-dot" class="position-absolute bottom-0 end-0 bg-secondary border border-2 border-white rounded-circle" style="width: 12px; height: 12px; transform: translate(2px, 2px);"></span>
            </div>
            <div>
                <h5 id="chat-active-user" class="mb-0 fw-bold">Usuario</h5>
                <small id="chat-active-status" class="text-dark opacity-75">Offline</small>
            </div>
        </div>
        
        <!-- Menú de Opciones del Chat -->
        <div class="dropdown">
            <button class="btn btn-dark rounded-circle d-flex align-items-center justify-content-center shadow-sm" style="width: 40px; height: 40px;" data-bs-toggle="dropdown">
                <i class="bi bi-three-dots-vertical"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                <li><a class="dropdown-item text-danger" href="#" onclick="window.ChatManager.limpiarHistorial(); return false;"><i class="bi bi-trash me-2"></i>Vaciar chat</a></li>
            </ul>
        </div>
    </div>
    
    <!-- Ventana de Mensajes (El historial) -->
    <div id="chat-window" class="p-3 flex-grow-1">
        <!-- Los mensajes se inyectan aquí -->
    </div>
    
    <!-- Footer: Contenedor de Input y Adjuntos -->
    <div class="chat-input-container bg-white border-top p-2 shadow-sm mt-auto">
        <!-- Preview del archivo adjunto (Oculto por defecto) -->
        <div id="chat-adjunto-preview" class="d-none align-items-center p-2 mb-2 bg-light rounded border">
            <i class="bi bi-file-earmark-fill text-primary fs-4 me-2"></i>
            <span id="chat-adjunto-nombre" class="text-truncate flex-grow-1 small fw-bold">archivo.pdf</span>
            <button type="button" class="btn-close ms-2" aria-label="Close" onclick="window.ChatManager.limpiarAdjuntoUI()"></button>
        </div>
        
        <!-- Input Area -->
        <div class="d-flex align-items-end gap-2 px-1">
            <input type="file" id="chat-file" class="d-none" accept=".pdf,.jpg,.jpeg,.png,.mp3,.mp4,.wma,.webm,.txt,.doc,.docx,.psd,.ai" onchange="window.actualizarEstadoAdjunto(this)">
            
            <!-- Botón de Adjuntar (Clip) -->
            <label for="chat-file" id="label-adjunto" class="btn btn-light border rounded-circle d-flex align-items-center justify-content-center m-0 shadow-sm" style="width: 45px; height: 45px; cursor: pointer;">
                <i class="bi bi-paperclip fs-5 text-secondary"></i>
            </label>
            
            <!-- Campo de Texto Original -->
            <textarea id="chat-msg-input" class="form-control rounded-4 border bg-light px-3 py-2" placeholder="Escribe un mensaje..." rows="1" style="resize: none; max-height: 100px;"></textarea>
            
            <!-- Botón de Enviar (Amarillo Original) -->
            <button class="btn btn-warning rounded-circle shadow-sm d-flex align-items-center justify-content-center m-0" style="width: 45px; height: 45px;" onclick="window.enviarAccionChat()">
                <i class="bi bi-send-fill text-dark"></i>
            </button>
        </div>
    </div>
    
</div>
