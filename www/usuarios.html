<!-- Vista: usuarios.html -->
<div class="container py-4 pb-5 mb-5 fade-in">
    <div class="d-flex align-items-center mb-3">
        <button class="btn btn-light rounded-circle shadow-sm me-3" onclick="history.back()">
            <i class="bi bi-arrow-left text-dark"></i>
        </button>
        <h4 class="fw-bold mb-0"><i class="bi bi-people-fill text-primary me-2"></i> Usuarios</h4>
    </div>
    
    <p class="text-muted small mb-4 ms-1">Toca el nombre del usuario para ver su <b>perfil completo</b>, cambia su nivel en <b>Rol</b>, o toca su número de teléfono para <b>chat</b>.</p>
    
    <div class="table-responsive bg-white rounded-4 shadow-sm p-2">
        <table class="table table-hover align-middle mb-0" style="font-size: 0.9rem;">
            <thead class="table-light">
                <tr>
                    <th scope="col" class="text-center">#</th>
                    <th scope="col">Usuario</th>
                    <th scope="col" class="text-center">Rol</th>
                    <th scope="col" class="text-center">Chat</th>
                </tr>
            </thead>
            <tbody id="tabla-usuarios-body">
                <tr>
                    <td colspan="4" class="text-center py-5">
                        <div class="spinner-border text-primary mb-2" role="status"></div>
                        <div class="text-muted small">Cargando base de datos...</div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- INYECTOR NATIVO: Totalmente inmune a rupturas del HTML parser -->
<img src="data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==" onload="
    var img = this;
    
    // Función para cambiar rol directamente desde la tabla
    window.cambiarRolInLine = async function(targetPin, nuevoRol, selectElement) {
        var originalValue = selectElement.getAttribute('data-original');
        selectElement.disabled = true;
        
        var activoStr = localStorage.getItem('usuarioActual') || '{}';
        var activo = {};
        try { activo = JSON.parse(activoStr); } catch(e){}
        var editorPin = activo.pin;
        
        var url = (typeof window.API_URL !== 'undefined') ? window.API_URL : ((typeof API_URL !== 'undefined') ? API_URL : '');
        
        try {
            var res = await fetch(url + '/admin/editar_usuario', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    target_pin: targetPin,
                    rol: nuevoRol,
                    editor_pin: editorPin
                })
            });
            var data = await res.json();
            
            if (data.status === 'ok') {
                window.cargarListaUsuariosAdmin();
            } else {
                alert('Denegado: ' + data.error);
                selectElement.value = originalValue;
                selectElement.disabled = false;
            }
        } catch(e) {
            alert('Fallo de conexión al cambiar rol.');
            selectElement.value = originalValue;
            selectElement.disabled = false;
        }
    };
    
    // Función para repintar la tabla
    window.cargarListaUsuariosAdmin = function() {
        var tbody = document.getElementById('tabla-usuarios-body');
        if (!tbody) return;
        
        // Estado de Carga Nativo
        tbody.innerHTML = '';
        var trInit = document.createElement('tr');
        var tdInit = document.createElement('td');
        tdInit.colSpan = 4;
        tdInit.className = 'text-center py-5';
        var spinInit = document.createElement('div');
        spinInit.className = 'spinner-border text-primary mb-2';
        var brInit = document.createElement('br');
        var smallInit = document.createElement('small');
        smallInit.className = 'text-muted';
        smallInit.textContent = 'Cargando base de datos...';
        tdInit.appendChild(spinInit);
        tdInit.appendChild(brInit);
        tdInit.appendChild(smallInit);
        trInit.appendChild(tdInit);
        tbody.appendChild(trInit);
        
        var url = (typeof window.API_URL !== 'undefined') ? window.API_URL : ((typeof API_URL !== 'undefined') ? API_URL : '');
        
        fetch(url + '/admin/usuarios')
        .then(function(res) { 
            if (!res.ok) throw new Error('Error HTTP ' + res.status);
            return res.json(); 
        })
        .then(function(data) {
            tbody.innerHTML = '';
            if (data.status === 'ok') {
                if (data.usuarios.length === 0) {
                    var trEmpty = document.createElement('tr');
                    var tdEmpty = document.createElement('td');
                    tdEmpty.colSpan = 4;
                    tdEmpty.className = 'text-center py-4';
                    tdEmpty.textContent = 'No hay usuarios registrados aún.';
                    trEmpty.appendChild(tdEmpty);
                    tbody.appendChild(trEmpty);
                    return;
                }
                
                data.usuarios.forEach(function(u) {
                    var tr = document.createElement('tr');
                    
                    var td1 = document.createElement('td');
                    td1.className = 'text-center align-middle';
                    var span1 = document.createElement('span');
                    span1.className = 'badge bg-secondary rounded-circle';
                    span1.textContent = u.consecutivo;
                    td1.appendChild(span1);
                    
                    var td2 = document.createElement('td');
                    td2.className = 'align-middle';
                    
                    var nameLink = document.createElement('a');
                    nameLink.href = '#editar_perfil';
                    nameLink.className = 'fw-bold d-block text-primary text-decoration-none mb-1 fs-6';
                    
                    var icon = document.createElement('i');
                    icon.className = 'bi bi-person-vcard me-1';
                    nameLink.appendChild(icon);
                    nameLink.appendChild(document.createTextNode(u.nombre));
                    
                    if (u.rol === 'superadmin') {
                        var badgeS = document.createElement('span');
                        badgeS.className = 'badge bg-danger rounded-pill ms-1';
                        badgeS.style.fontSize = '0.65rem';
                        badgeS.textContent = 'Super';
                        nameLink.appendChild(badgeS);
                    } else if (u.rol === 'admin') {
                        var badgeA = document.createElement('span');
                        badgeA.className = 'badge bg-warning text-dark rounded-pill ms-1';
                        badgeA.style.fontSize = '0.65rem';
                        badgeA.textContent = 'Admin';
                        nameLink.appendChild(badgeA);
                    }
                    
                    nameLink.onclick = function() {
                        localStorage.setItem('adminTargetPin', u.pin);
                    };
                    
                    var small2 = document.createElement('small');
                    small2.className = 'text-muted d-block';
                    small2.textContent = u.apellido1;
                    
                    td2.appendChild(nameLink);
                    td2.appendChild(small2);
                    
                    var tdRol = document.createElement('td');
                    tdRol.className = 'text-center align-middle';
                    
                    var selectRol = document.createElement('select');
                    selectRol.className = 'form-select form-select-sm rounded-pill bg-light border-secondary shadow-sm text-center';
                    selectRol.style.fontSize = '0.75rem';
                    selectRol.style.minWidth = '100px';
                    selectRol.style.display = 'inline-block';
                    
                    selectRol.add(new Option('Usuario', 'usuario'));
                    selectRol.add(new Option('Admin', 'admin'));
                    selectRol.add(new Option('Super', 'superadmin'));
                    
                    selectRol.value = u.rol || 'usuario';
                    selectRol.setAttribute('data-original', u.rol || 'usuario');
                    
                    if (u.pin === '00000000' || u.pin === '88888888') {
                        selectRol.disabled = true;
                        selectRol.className = 'form-select form-select-sm rounded-pill bg-secondary text-white border-0 shadow-sm text-center';
                        selectRol.title = 'Superusuario Raíz Intocable';
                    } else {
                        selectRol.onchange = function() {
                            window.cambiarRolInLine(u.pin, this.value, this);
                        };
                    }
                    
                    tdRol.appendChild(selectRol);
                    
                    var td3 = document.createElement('td');
                    td3.className = 'text-center align-middle';
                    var btn = document.createElement('button');
                    btn.className = 'btn btn-sm btn-success rounded-pill px-3 fw-bold shadow-sm';
                    btn.onclick = function() { 
                        if(typeof window.abrirChatPrivado === 'function') {
                            window.abrirChatPrivado(u.pin, u.nombre);
                        } else if(typeof window.abrirModalChat === 'function') { 
                            window.abrirModalChat(); 
                            setTimeout(function(){ window.seleccionarContacto(u.pin, u.nombre); }, 350); 
                        }
                    };
                    var wIcon = document.createElement('i');
                    wIcon.className = 'bi bi-whatsapp me-1';
                    btn.appendChild(wIcon);
                    btn.appendChild(document.createTextNode(' ' + u.pin));
                    td3.appendChild(btn);
                    
                    tr.appendChild(td1);
                    tr.appendChild(td2);
                    tr.appendChild(tdRol);
                    tr.appendChild(td3);
                    tbody.appendChild(tr);
                });
            } else {
                throw new Error(data.error || 'Error del servidor');
            }
        })
        .catch(function(e) {
            tbody.innerHTML = '';
            var trErr = document.createElement('tr');
            var tdErr = document.createElement('td');
            tdErr.colSpan = 4;
            tdErr.className = 'text-center text-danger py-4 fw-bold';
            tdErr.textContent = 'Fallo de Conexión: ' + e.message;
            trErr.appendChild(tdErr);
            tbody.appendChild(trErr);
        });
    };

    // Disparamos la carga la primera vez
    window.cargarListaUsuariosAdmin();
    img.remove();
