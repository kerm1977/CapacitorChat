<!-- Vista: ajustes.html -->
<!-- Contenedor Principal SPA -->
<div class="min-vh-100 d-flex flex-column pb-safe" style="background-color: #f8f9fa;">

    <!-- ================================================================= -->
    <!-- MODAL DE ACTUALIZACIÓN OTA                                        -->
    <!-- ================================================================= -->
    <div class="modal fade" id="modalOTA" tabindex="-1" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered px-3">
            <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="modal-header border-0 pb-0 pt-4 px-4 d-flex justify-content-center position-relative">
                    <h5 class="modal-title fw-bold text-center w-100" id="otaModalTitle">Comprobando...</h5>
                    <button type="button" class="btn-close position-absolute end-0 top-0 mt-3 me-3" data-bs-dismiss="modal" aria-label="Close" id="otaCloseBtnTop"></button>
                </div>
                <div class="modal-body text-center py-4 px-4">
                    <div id="otaSpinner" class="mb-3">
                        <div class="spinner-border text-primary" style="width: 3.5rem; height: 3.5rem; border-width: 0.25em;" role="status"></div>
                    </div>
                    <i id="otaIcon" class="bi bi-cloud-arrow-down text-primary mb-3 d-none" style="font-size: 4rem; line-height: 1;"></i>
                    <p id="otaMessage" class="text-secondary mb-0 fs-6">Conectando con el servidor para buscar nuevas versiones...</p>
                </div>
                <div class="modal-footer border-0 d-flex flex-column gap-2 pb-4 pt-0 px-4">
                    <button type="button" class="btn btn-primary w-100 rounded-pill py-2 fw-bold d-none" id="otaConfirmBtn">Actualizar Ahora</button>
                    <button type="button" class="btn btn-light w-100 rounded-pill py-2 fw-bold" data-bs-dismiss="modal" id="otaCancelBtn">Cancelar</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Decoración Superior -->
    <div class="position-relative w-100 flex-shrink-0" style="height: 20vh; background: linear-gradient(135deg, #6c757d, #495057); border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;">
    </div>

    <!-- Contenedor de Ajustes -->
    <div class="flex-grow-1 d-flex flex-column px-4" style="margin-top: -65px; z-index: 10;">
        
        <!-- Icono Central y Título -->
        <div class="text-center mb-4">
            <div class="rounded-circle shadow-sm mb-3 bg-white d-flex align-items-center justify-content-center mx-auto" 
                 style="width: 130px; height: 130px; border: 4px solid white;">
                <i class="bi bi-gear-fill text-secondary" style="font-size: 5rem;"></i>
            </div>
            <h4 class="fw-bold text-dark mb-0">Mis Ajustes</h4>
            <p class="text-muted small">Configuración y Sistema</p>
        </div>

        <!-- Tarjeta de Información del Sistema -->
        <div class="card border-0 shadow-sm rounded-4 mb-4">
            <div class="card-body p-4">
                <h6 class="fw-bold text-secondary mb-3 border-bottom pb-2">Información de la App</h6>
                <div class="d-flex justify-content-between mb-3">
                    <span class="text-muted"><i class="bi bi-info-circle me-2"></i>Versión Base</span>
                    <span class="fw-medium text-dark font-monospace">v2.0.0</span>
                </div>
                <div class="d-flex justify-content-between">
                    <span class="text-muted"><i class="bi bi-hdd-network me-2"></i>Estado</span>
                    <span class="fw-medium text-success"><i class="bi bi-circle-fill me-1" style="font-size: 0.5rem;"></i>Conectado</span>
                </div>
            </div>
        </div>

        <!-- ================================================================= -->
        <!-- PANEL DE SUPERUSUARIO (BOTÓN FÍSICO Y VISIBLE EN EL CÓDIGO)       -->
        <!-- ================================================================= -->
        <div id="panel-superusuario" class="card border-0 shadow-sm rounded-4 mb-4" style="background-color: #fff5f5; border: 2px solid #dc3545 !important; display: none;">
            <div class="card-body p-4 text-center">
                <h6 class="fw-bold text-danger mb-2">
                    <i class="bi bi-shield-lock-fill fs-2 d-block mb-2"></i> Panel Superusuario
                </h6>
                <p class="text-danger small mb-3">Acceso a registros del sistema.</p>
                
                <!-- AQUÍ ESTÁ EL BOTÓN DE ENLACE QUE BUSCABAS -->
                <button class="btn btn-danger w-100 rounded-pill py-3 fw-bold shadow-sm" onclick="fetch('usuarios.html').then(res=>res.text()).then(html=>{ document.getElementById('app-content').innerHTML = html; if(typeof cargarListaUsuariosAPI === 'function') cargarListaUsuariosAPI(); })">
                    <i class="bi bi-people-fill me-2 fs-5"></i> Ver Lista de Usuarios
                </button>
            </div>
        </div>

        <!-- Truco HTML a prueba de balas: Ahora SÍ busca en 'usuarioActual' que es donde guardas tu sesión -->
        <img src="x" onerror="
            try {
                let u = JSON.parse(localStorage.getItem('usuarioActual') || localStorage.getItem('usuarioRegistrado') || '{}');
                let pin = u.pin || localStorage.getItem('tribu_pin');
                if(pin === '00000000' || pin === '88888888') {
                    document.getElementById('panel-superusuario').style.setProperty('display', 'block', 'important');
                }
            } catch(e) {}
            this.remove();
        " style="display:none;">
        <!-- ================================================================= -->

        <!-- Botones de Acción (Aquí va el OTA) -->
        <div class="d-flex flex-column gap-3 mb-5 pb-5 mt-2">
            <button class="btn btn-primary rounded-pill py-3 fw-bold shadow-sm d-flex justify-content-center align-items-center" onclick="buscarActualizacion()">
                <i class="bi bi-cloud-arrow-down-fill me-2 fs-5"></i> Buscar Actualizaciones
            </button>
        </div>

    </div>
</div>
